<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AiContaFiscalRD | Iniciar Sesión</title>
    <style>
        :root {
            --bg-base: #0a0c10;
            --bg-card: #161b24;
            --bg-input: #1e2535;
            --border: rgba(255,255,255,0.08);
            --primary: #6366f1;
            --primary-glow: rgba(99,102,241,0.25);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #4b5563;
            --danger: #f43f5e;
            --success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,0.10) 0%, transparent 60%);
        }
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 380px;
            max-width: 90vw;
            box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .login-card h1 {
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            margin-bottom: 4px;
        }
        .login-card p {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        .error { color: var(--danger); font-size: 12px; margin-top: 12px; text-align: center; display: none; }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo span { font-size: 36px; }
        .badge {
            display: inline-block;
            background: rgba(99,102,241,0.15);
            color: var(--primary);
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span class="material-symbols-rounded" style="font-size:42px;color:var(--primary);">account_balance</span>
        </div>
        <h1>AiConta<span style="color:var(--primary);">Fiscal</span>RD</h1>
        <p>Inicia sesión para acceder al panel</p>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="contador@ejemplo.com" autocomplete="email" autofocus>
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()">
        </div>
        <button class="btn-login" id="btn-login" onclick="doLogin()">Iniciar Sesión</button>
        <div class="error" id="error"></div>
    </div>

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,300..700,0..1,-50..200">

    <script>
        const API_URL = window.location.origin;

        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-login');
            const error = document.getElementById('error');

            if (!email || !password) {
                error.textContent = 'Completá todos los campos';
                error.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Ingresando…';
            error.style.display = 'none';

            try {
                const resp = await fetch(API_URL + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password }),
                });
                const data = await resp.json();

                if (resp.status !== 200) {
                    error.textContent = data.detail || 'Error de autenticación';
                    error.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Iniciar Sesión';
                    return;
                }

                localStorage.setItem('token', data.access_token);
                localStorage.setItem('user', JSON.stringify(data.profile));
                window.location.href = '/';
            } catch (e) {
                error.textContent = 'Error de conexión con el servidor';
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
            }
        }
    </script>
</body>
</html>
